events {
    worker_connections 1024;
}

http {
    upstream gemma_backend {
        server gemma-vllm:8000;
    }

    upstream mpnet_backend {
        server mpnet-tei:80;
    }

    upstream whisper_backend {
        server whisper-api:8000;
    }

    server {
        listen 80;

        location /v1/chat/completions {
            proxy_pass http://gemma_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /v1/embeddings {
            proxy_pass http://mpnet_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /v1/audio/transcriptions {
            proxy_pass http://whisper_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
